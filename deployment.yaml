apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food
  template:
    metadata:
      labels:
        app: food
    spec:
      containers:
      - name: backend
        image: food-backend
        ports:
        - containerPort: 5000
